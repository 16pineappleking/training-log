<script>
const EXERCISES = [
  { name: "Hip Thrust",                         category: "Legs",      mode: "setsrepsweight" },
  { name: "Squat",                              category: "Legs",      mode: "setsrepsweight" },
  { name: "Lateral Squat",                      category: "Legs",      mode: "setsrepsweight" },
  { name: "Iso Lunge Hold",                     category: "Legs",      mode: "setshold" },
  { name: "Dumbbell Bench Press",               category: "Chest",     mode: "setsrepsweight" },
  { name: "Incline Dumbbell Bench Press",       category: "Chest",     mode: "setsrepsweight" },
  { name: "Meadows Row",                        category: "Back",      mode: "setsrepsweight" },
  { name: "Pull-Ups",                           category: "Back",      mode: "repsonly" },
  { name: "Standing Overhead Press",            category: "Shoulders", mode: "setsrepsweight" },
  { name: "Single Arm Kneeling Shoulder Press", category: "Shoulders", mode: "setsrepsweight" },
  { name: "Dips",                               category: "Arms",      mode: "repsonly" },
  { name: "Incline Dumbbell Curl",              category: "Arms",      mode: "setsrepsweight" },
  { name: "Tricep Pushdown",                    category: "Arms",      mode: "setsrepsweight" },
  { name: "Half Kneeling Landmine Rotation",    category: "Core",      mode: "setsrepsweight" },
];

const CATEGORIES = ["Legs","Chest","Back","Shoulders","Arms","Core"];
const CAT_COLORS = { Legs:"#f97316", Chest:"#22d3ee", Back:"#a3e635", Shoulders:"#f472b6", Arms:"#a78bfa", Core:"#fbbf24" };
const STORAGE_KEY = "caoimhe-workout-tracker-v3";
const MAX_SETS = 4;

let logs = [];
let currentView = "log";
let srwSets = [{ reps: "", weight: "" }];
let shSets  = [{ hold: "", weight: "" }];

function formatDate(d) {
  return new Date(d).toLocaleDateString("en-CA", { month: "short", day: "numeric" });
}

function load() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) logs = JSON.parse(r); } catch {}
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(logs)); } catch {}
}

function getMode() {
  const name = document.getElementById("exercise-select").value;
  return (EXERCISES.find(e => e.name === name) || {}).mode || "setsrepsweight";
}

function getCategory(name) {
  return (EXERCISES.find(e => e.name === name) || {}).category || "Other";
}

function setView(v) {
  currentView = v;
  ["log","history","stats"].forEach(x => {
    document.getElementById("view-" + x).classList.toggle("hidden", x !== v);
  });
  document.querySelectorAll(".nav-btn").forEach((btn, i) => {
    btn.classList.toggle("active", ["log","history","stats"][i] === v);
  });
  if (v === "history") renderHistory();
  if (v === "stats")   initStats();
}

function onExerciseChange() {
  srwSets = [{ reps: "", weight: "" }];
  shSets  = [{ hold: "", weight: "" }];
  document.getElementById("note-input").value = "";
  renderModeSections();
}

function renderModeSections() {
  const mode = getMode();
  document.getElementById("mode-repsonly").classList.toggle("hidden", mode !== "repsonly");
  document.getElementById("mode-setsrepsweight").classList.toggle("hidden", mode !== "setsrepsweight");
  document.getElementById("mode-setshold").classList.toggle("hidden", mode !== "setshold");
  if (mode === "setsrepsweight") renderSrwRows();
  if (mode === "setshold")       renderShRows();
  if (mode === "repsonly")       document.getElementById("single-reps").value = "";
}

function renderSrwRows() {
  const c = document.getElementById("sets-container-srw");
  c.innerHTML = srwSets.map((s, i) => `
    <div class="set-row">
      <div class="set-label">SET ${i+1}</div>
      <div class="set-grid">
        <input type="number" inputmode="numeric" placeholder="reps" value="${s.reps}"
          oninput="srwSets[${i}].reps=this.value" />
        <input type="number" inputmode="decimal" placeholder="lbs" value="${s.weight}"
          oninput="srwSets[${i}].weight=this.value" />
      </div>
      ${srwSets.length > 1 ? `<button class="rm-set" onclick="removeSrwSet(${i})">×</button>` : ""}
    </div>
  `).join("");
  const btn = document.getElementById("add-set-btn-srw");
  if (srwSets.length >= MAX_SETS) { btn.classList.add("hidden"); }
  else { btn.classList.remove("hidden"); btn.textContent = `+ add set ${srwSets.length + 1}`; }
}

function renderShRows() {
  const c = document.getElementById("sets-container-sh");
  c.innerHTML = shSets.map((s, i) => `
    <div class="set-row">
      <div class="set-label">SET ${i+1}</div>
      <div class="set-grid">
        <input type="number" inputmode="numeric" placeholder="seconds" value="${s.hold}"
          oninput="shSets[${i}].hold=this.value" />
        <input type="number" inputmode="decimal" placeholder="lbs (opt)" value="${s.weight}"
          oninput="shSets[${i}].weight=this.value" />
      </div>
      ${shSets.length > 1 ? `<button class="rm-set" onclick="removeShSet(${i})">×</button>` : ""}
    </div>
  `).join("");
  const btn = document.getElementById("add-set-btn-sh");
  if (shSets.length >= MAX_SETS) { btn.classList.add("hidden"); }
  else { btn.classList.remove("hidden"); btn.textContent = `+ add set ${shSets.length + 1}`; }
}

function addSetRow(type) {
  if (type === "srw" && srwSets.length < MAX_SETS) { srwSets.push({ reps: "", weight: "" }); renderSrwRows(); }
  if (type === "sh"  && shSets.length  < MAX_SETS) { shSets.push({ hold: "", weight: "" });  renderShRows(); }
}

function removeSrwSet(i) { srwSets.splice(i, 1); renderSrwRows(); }
function removeShSet(i)  { shSets.splice(i, 1);  renderShRows(); }

function logEntry() {
  const exercise = document.getElementById("exercise-select").value;
  const mode     = getMode();
  const note     = document.getElementById("note-input").value.trim();
  let sets = [];

  if (mode === "repsonly") {
    const r = document.getElementById("single-reps").value;
    if (!r) return;
    sets = [{ reps: parseInt(r), weight: null, hold: null }];
  } else if (mode === "setsrepsweight") {
    sets = srwSets
      .filter(s => s.reps !== "" || s.weight !== "")
      .map(s => ({ reps: s.reps ? parseInt(s.reps) : null, weight: s.weight ? parseFloat(s.weight) : null, hold: null }));
  } else if (mode === "setshold") {
    sets = shSets
      .filter(s => s.hold !== "" || s.weight !== "")
      .map(s => ({ reps: null, weight: s.weight ? parseFloat(s.weight) : null, hold: s.hold ? parseInt(s.hold) : null }));
  }

  if (!sets.length) return;

  const entry = { id: Date.now(), date: new Date().toISOString(), exercise, category: getCategory(exercise), mode, sets, note };
  logs.unshift(entry);
  save();
  updateEntryCount();

  srwSets = [{ reps: "", weight: "" }];
  shSets  = [{ hold: "", weight: "" }];
  document.getElementById("note-input").value = "";
  if (mode === "repsonly") document.getElementById("single-reps").value = "";
  renderModeSections();
  renderRecent();

  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1800);
}

function deleteLog(id) {
  logs = logs.filter(l => l.id !== id);
  save();
  updateEntryCount();
  renderRecent();
  if (currentView === "history") renderHistory();
  if (currentView === "stats")   renderStats();
}

function updateEntryCount() {
  const n = logs.length;
  document.getElementById("entry-count").textContent = `${n} ENTR${n !== 1 ? "IES" : "Y"} RECORDED`;
}

function renderSetTags(log) {
  return (log.sets || []).map(s => {
    if (log.mode === "repsonly") return `<span class="set-tag">${s.reps} reps</span>`;
    if (log.mode === "setshold") return `<span class="set-tag">${s.hold ? s.hold+"s" : "—"}${s.weight ? " @ "+s.weight+"lbs" : ""}</span>`;
    return `<span class="set-tag">${s.reps ?? "—"} reps${s.weight ? " @ "+s.weight+"lbs" : ""}</span>`;
  }).join("");
}

function logCardHTML(log, showDate) {
  const col = CAT_COLORS[log.category] || "#888";
  return `
    <div class="card">
      <div class="card-row">
        <div class="card-bar" style="background:${col}"></div>
        <div class="card-body">
          <div class="card-meta">
            <div class="card-title">${log.exercise}</div>
            ${showDate ? `<div class="card-date">${formatDate(log.date)}</div>` : ""}
          </div>
          <div>${renderSetTags(log)}</div>
          ${!showDate ? `<div class="card-small-date">${formatDate(log.date)}</div>` : ""}
          ${log.note ? `<div class="card-note">${log.note}</div>` : ""}
        </div>
        <button class="del-btn" onclick="deleteLog(${log.id})">×</button>
      </div>
    </div>
  `;
}

function renderRecent() {
  const sec = document.getElementById("recent-section");
  const list = document.getElementById("recent-list");
  if (!logs.length) { sec.classList.add("hidden"); return; }
  sec.classList.remove("hidden");
  list.innerHTML = logs.slice(0, 5).map(l => logCardHTML(l, false)).join("");
}

function onFilterCatChange() {
  const cat = document.getElementById("filter-cat").value;
  const exSel = document.getElementById("filter-ex");
  const exList = cat === "All"
    ? EXERCISES.map(e => e.name)
    : EXERCISES.filter(e => e.category === cat).map(e => e.name);
  exSel.innerHTML = ["All", ...exList].map(ex => `<option>${ex}</option>`).join("");
  renderHistory();
}

function renderHistory() {
  const cat = document.getElementById("filter-cat").value;
  const ex  = document.getElementById("filter-ex").value;
  const filtered = logs.filter(l =>
    (cat === "All" || l.category === cat) &&
    (ex  === "All" || l.exercise === ex)
  );
  const list = document.getElementById("history-list");
  if (!filtered.length) { list.innerHTML = `<div class="empty">Nothing logged yet.</div>`; return; }
  list.innerHTML = filtered.map(l => logCardHTML(l, true)).join("");
}

// ── STATS ───────────────────────────────────────────────────────────

function initStats() {
  // populate exercise dropdown with only exercises that have logs
  const logged = [...new Set(logs.map(l => l.exercise))];
  const sel = document.getElementById("stats-ex-select");
  sel.innerHTML = `<option value="">— select an exercise —</option>` +
    CATEGORIES.flatMap(cat => {
      const exes = EXERCISES.filter(e => e.category === cat && logged.includes(e.name));
      if (!exes.length) return [];
      return [`<optgroup label="── ${cat.toUpperCase()}">`]
        .concat(exes.map(e => `<option value="${e.name}">${e.name}</option>`))
        .concat(["</optgroup>"]);
    }).join("");
  renderStats();
}

function getBestSet(sets, mode) {
  if (mode === "repsonly") return Math.max(...sets.map(s => s.reps || 0));
  if (mode === "setshold") return Math.max(...sets.map(s => s.hold || 0));
  // setsrepsweight — best set by weight, then reps
  let best = null;
  sets.forEach(s => {
    if (!best) { best = s; return; }
    const w = s.weight || 0, bw = best.weight || 0;
    const r = s.reps || 0, br = best.reps || 0;
    if (w > bw || (w === bw && r > br)) best = s;
  });
  return best;
}

function drawChart(canvasId, labels, values, color, unit) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const pad = { top: 10, right: 10, bottom: 28, left: 36 };
  const cW = W - pad.left - pad.right;
  const cH = H - pad.top - pad.bottom;

  ctx.clearRect(0, 0, W, H);

  if (values.length < 2) {
    ctx.fillStyle = "#444";
    ctx.font = "11px 'DM Mono'";
    ctx.textAlign = "center";
    ctx.fillText("Log more sessions to see chart", W/2, H/2);
    return;
  }

  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;

  // grid lines
  ctx.strokeStyle = "#1a1a1a";
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + (cH / 4) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cW, y); ctx.stroke();
    const val = max - (range / 4) * i;
    ctx.fillStyle = "#444";
    ctx.font = "9px 'DM Mono'";
    ctx.textAlign = "right";
    ctx.fillText(Math.round(val), pad.left - 4, y + 3);
  }

  // line
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.lineJoin = "round";
  ctx.beginPath();
  values.forEach((v, i) => {
    const x = pad.left + (i / (values.length - 1)) * cW;
    const y = pad.top + cH - ((v - min) / range) * cH;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // dots
  values.forEach((v, i) => {
    const x = pad.left + (i / (values.length - 1)) * cW;
    const y = pad.top + cH - ((v - min) / range) * cH;
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  });

  // x labels (show first, last, and middle if space)
  ctx.fillStyle = "#444";
  ctx.font = "9px 'DM Mono'";
  ctx.textAlign = "center";
  const showIdx = values.length <= 6
    ? values.map((_, i) => i)
    : [0, Math.floor(values.length / 2), values.length - 1];
  showIdx.forEach(i => {
    const x = pad.left + (i / (values.length - 1)) * cW;
    ctx.fillText(labels[i], x, H - 6);
  });
}

function renderStats() {
  const exName = document.getElementById("stats-ex-select").value;
  const content = document.getElementById("stats-content");

  if (!exName) { content.innerHTML = ""; return; }

  const exDef = EXERCISES.find(e => e.name === exName);
  const mode = exDef ? exDef.mode : "setsrepsweight";
  const col = CAT_COLORS[exDef ? exDef.category : "Other"] || "#f97316";
  const exLogs = logs.filter(l => l.exercise === exName).slice().reverse(); // oldest first

  if (!exLogs.length) {
    content.innerHTML = `<div class="empty">No sessions logged for this exercise yet.</div>`;
    return;
  }

  // Build data points — best set per session
  const dataPoints = exLogs.map(l => {
    const best = getBestSet(l.sets || [], mode);
    return { date: formatDate(l.date), best, sets: l.sets };
  });

  // Key metrics
  const firstSession = dataPoints[0];
  const lastSession  = dataPoints[dataPoints.length - 1];
  const allBests     = dataPoints.map(d => {
    if (mode === "repsonly" || mode === "setshold") return typeof d.best === "number" ? d.best : 0;
    return d.best ? (d.best.weight || 0) : 0;
  });
  const overallBest = Math.max(...allBests);
  const recentVal   = allBests[allBests.length - 1];
  const firstVal    = allBests[0];

  // Trend: compare last 3 sessions avg vs first 3
  const recent3 = allBests.slice(-3);
  const first3  = allBests.slice(0, 3);
  const recentAvg = recent3.reduce((a,b) => a+b, 0) / recent3.length;
  const firstAvg  = first3.reduce((a,b) => a+b, 0) / first3.length;
  const trendPct  = firstAvg > 0 ? ((recentAvg - firstAvg) / firstAvg * 100).toFixed(1) : 0;
  const trendDir  = recentAvg > firstAvg ? "up" : recentAvg < firstAvg ? "down" : "flat";

  // Stale warning: no improvement in last 3 sessions
  const last3 = allBests.slice(-3);
  const isStale = last3.length >= 3 && last3.every(v => v <= last3[0]);
  const daysSinceLast = Math.floor((Date.now() - new Date(exLogs[exLogs.length-1].date)) / 86400000);

  // Best vs recent label
  let bestLabel = "", recentLabel = "", unit = "";
  if (mode === "repsonly") {
    unit = "reps";
    bestLabel   = `${overallBest} reps`;
    recentLabel = `${recentVal} reps`;
  } else if (mode === "setshold") {
    unit = "s";
    bestLabel   = `${overallBest}s`;
    recentLabel = `${recentVal}s`;
  } else {
    unit = "lbs";
    const bestEntry = dataPoints.reduce((a,b) => (b.best && b.best.weight > (a.best && a.best.weight || 0)) ? b : a);
    bestLabel   = bestEntry.best ? `${bestEntry.best.weight}lbs × ${bestEntry.best.reps}reps` : "—";
    recentLabel = lastSession.best ? `${lastSession.best.weight || "BW"}lbs × ${lastSession.best.reps}reps` : "—";
  }

  const trendHTML = trendDir === "up"
    ? `<span class="trend-up">▲ ${trendPct}% overall</span>`
    : trendDir === "down"
    ? `<span class="trend-down">▼ ${Math.abs(trendPct)}% overall</span>`
    : `<span class="trend-flat">→ Flat</span>`;

  const staleHTML = isStale
    ? `<div class="trend-warn">⚠ No improvement in last 3 sessions — time to push harder or deload</div>`
    : "";

  const chartId = "stats-chart-" + exName.replace(/\s+/g,"_");
  const chartId2 = "stats-chart2-" + exName.replace(/\s+/g,"_");

  // For weight chart and reps chart separately (setsrepsweight)
  const weightVals = mode === "setsrepsweight"
    ? dataPoints.map(d => d.best ? (d.best.weight || 0) : 0)
    : null;
  const repVals = mode === "setsrepsweight"
    ? dataPoints.map(d => d.best ? (d.best.reps || 0) : 0)
    : mode === "repsonly"
    ? dataPoints.map(d => typeof d.best === "number" ? d.best : 0)
    : null;
  const holdVals = mode === "setshold"
    ? dataPoints.map(d => typeof d.best === "number" ? d.best : 0)
    : null;
  const dateLabels = dataPoints.map(d => d.date);

  content.innerHTML = `
    <div class="stats-cat-head">
      <span class="cat-dot" style="background:${col}"></span>
      <span class="cat-label" style="color:${col}">${exDef ? exDef.category : ""}</span>
    </div>
    <div class="stats-card" style="border-left:3px solid ${col}">
      <div class="stats-ex-name">${exName}</div>

      <div class="pill-row">
        <div><div class="pv">${exLogs.length}</div><div class="pl">SESSIONS</div></div>
        <div><div class="pv" style="font-size:15px">${bestLabel}</div><div class="pl">BEST EVER</div></div>
        <div><div class="pv" style="font-size:15px">${recentLabel}</div><div class="pl">MOST RECENT</div></div>
      </div>

      <div class="trend-row">${trendHTML}</div>
      ${staleHTML}

      ${weightVals ? `
        <div class="chart-label">LOAD OVER TIME (lbs)</div>
        <div class="chart-wrap">
          <canvas id="${chartId}" width="460" height="140"></canvas>
        </div>
      ` : ""}

      ${repVals ? `
        <div class="chart-label" style="margin-top:14px">${mode === "repsonly" ? "REPS OVER TIME" : "REPS OVER TIME (best set)"}</div>
        <div class="chart-wrap">
          <canvas id="${chartId2}" width="460" height="140"></canvas>
        </div>
      ` : ""}

      ${holdVals ? `
        <div class="chart-label">HOLD TIME OVER TIME (seconds)</div>
        <div class="chart-wrap">
          <canvas id="${chartId}" width="460" height="140"></canvas>
        </div>
      ` : ""}
    </div>
  `;

  // Draw charts after DOM update
  setTimeout(() => {
    if (weightVals) drawChart(chartId, dateLabels, weightVals, col, "lbs");
    if (repVals)    drawChart(chartId2, dateLabels, repVals, "#888", "reps");
    if (holdVals)   drawChart(chartId, dateLabels, holdVals, col, "s");
  }, 0);
}

// ── Init ─────────────────────────────────────────────────────────────
load();
updateEntryCount();
renderModeSections();
renderRecent();
</script>
